name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true


      - name: Ensure Visual C++ ATL is installed
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $installPath) { throw "Visual Studio installation was not found." }
          $arguments = @(
            "modify",
            "--installPath", $installPath,
            "--add", "Microsoft.VisualStudio.Component.VC.ATL",
            "--quiet",
            "--norestart"
          )
          $process = Start-Process -FilePath $installer -ArgumentList $arguments -Wait -PassThru
          if ($process.ExitCode -ne 0 -and $process.ExitCode -ne 3010) {
            throw "ATL installation failed with code $($process.ExitCode)"
          }

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Create platform files
        run: flutter create --platforms=android,windows --org ru.ghostnet .

      - name: Fix generated Flutter template test
        run: python tools/fix_generated_test.py

      - name: Fix Android name and remove MainActivity duplicates
        run: python tools/patch_app_name.py

      - name: Fix Windows title, exe name and CMake compatibility
        run: python tools/patch_windows_title.py

      - name: Show Windows CMake compatibility patch
        shell: powershell
        run: |
          Select-String -Path windows\CMakeLists.txt -Pattern "CMAKE_POLICY_VERSION_MINIMUM"

      - name: Install dependencies
        run: flutter pub get


      - name: Verify security patch
        run: python tools/security_check.py

      - name: Format Dart source
        run: dart format lib/main.dart

      - name: Analyze project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build Windows release
        run: flutter build windows --release

      - name: Add protocol registration helper
        shell: powershell
        run: Copy-Item register_ghostnet_protocol_windows.bat build\windows\x64\runner\Release\register_ghostnet_protocol_windows.bat -Force

      - name: Pack Windows build
        shell: powershell
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath GhostNet-Cyber-VPN-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: GhostNet-Cyber-VPN-Windows
          path: GhostNet-Cyber-VPN-Windows.zip
