name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true


      - name: Verify preinstalled Visual C++ ATL
        shell: powershell
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found on the GitHub runner."
          }

          $installPath = & $vswhere `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -requires Microsoft.VisualStudio.Component.VC.ATL `
            -property installationPath

          if (-not $installPath) {
            throw "The GitHub windows-2022 image does not expose the preinstalled Visual C++ ATL component."
          }

          $atlHeader = Get-ChildItem `
            -Path (Join-Path $installPath "VC\Tools\MSVC\*\atlmfc\include\atlbase.h") `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $atlHeader) {
            throw "ATL component is registered, but atlbase.h was not found."
          }

          Write-Host "Visual Studio: $installPath"
          Write-Host "ATL header: $($atlHeader.FullName)"

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Create platform files
        run: flutter create --platforms=android,windows --org ru.ghostnet .

      - name: Fix generated Flutter template test
        run: python tools/fix_generated_test.py

      - name: Fix Android name and remove MainActivity duplicates
        run: python tools/patch_app_name.py

      - name: Fix Windows title, exe name and CMake compatibility
        run: python tools/patch_windows_title.py


      - name: Verify Windows single-instance patch
        shell: powershell
        run: |
          Select-String `
            -Path windows\runner\main.cpp `
            -Pattern "GHOSTNET_SINGLE_INSTANCE_GUARD_BEGIN"

          Select-String `
            -Path windows\runner\main.cpp `
            -Pattern "CreateMutexW"

          Select-String `
            -Path windows\runner\main.cpp `
            -Pattern "FindWindowW"

      - name: Show Windows CMake compatibility patch
        shell: powershell
        run: |
          Select-String -Path windows\CMakeLists.txt -Pattern "CMAKE_POLICY_VERSION_MINIMUM"

      - name: Install dependencies
        run: flutter pub get


      - name: Verify automatic update system
        run: python tools/update_system_check.py

      - name: Verify security patch
        run: python tools/security_check.py

      - name: Format Dart source
        run: dart format lib/main.dart

      - name: Analyze project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Detect Windows code-signing certificate
        id: windows-signing
        shell: powershell
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $hasCertificate = -not [string]::IsNullOrWhiteSpace(
            $env:WINDOWS_CERTIFICATE_BASE64
          )
          $hasPassword = -not [string]::IsNullOrWhiteSpace(
            $env:WINDOWS_CERTIFICATE_PASSWORD
          )

          if ($hasCertificate -xor $hasPassword) {
            throw "Windows signing secrets are incomplete. Configure both WINDOWS_CERTIFICATE_BASE64 and WINDOWS_CERTIFICATE_PASSWORD."
          }

          $enabled = $hasCertificate -and $hasPassword
          "enabled=$($enabled.ToString().ToLowerInvariant())" |
            Out-File `
              -FilePath $env:GITHUB_OUTPUT `
              -Encoding utf8 `
              -Append

          if ($enabled) {
            Write-Host "Trusted Windows signing is enabled."
          } else {
            Write-Warning "Trusted Windows certificate is not configured. The installer will be built unsigned."
          }

      - name: Restore Windows code-signing certificate
        if: steps.windows-signing.outputs.enabled == 'true'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          $certificatePath = Join-Path `
            $env:RUNNER_TEMP `
            "ghostnet-code-signing.pfx"

          [System.IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String(
              $env:WINDOWS_CERTIFICATE_BASE64
            )
          )

          if ((Get-Item $certificatePath).Length -lt 100) {
            throw "Decoded Windows certificate is unexpectedly small."
          }

          "WINDOWS_CERTIFICATE_PATH=$certificatePath" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

      - name: Build Windows release
        run: flutter build windows --release

      - name: Add protocol registration helper
        shell: powershell
        run: Copy-Item register_ghostnet_protocol_windows.bat build\windows\x64\runner\Release\register_ghostnet_protocol_windows.bat -Force

      - name: Sign Windows application
        if: steps.windows-signing.outputs.enabled == 'true'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          .\tools\sign_windows_artifact.ps1 `
            -FilePath "build\windows\x64\runner\Release\GhostNetCyberVPN.exe" `
            -CertificatePath $env:WINDOWS_CERTIFICATE_PATH `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD

      - name: Verify Inno Setup compiler
        shell: powershell
        run: |
          $iscc = Get-Command ISCC.exe -ErrorAction SilentlyContinue

          if (-not $iscc) {
            $fallback = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            if (-not (Test-Path $fallback)) {
              throw "ISCC.exe was not found on windows-2022."
            }
            $isccPath = $fallback
          } else {
            $isccPath = $iscc.Source
          }

          if (-not (Test-Path $isccPath)) {
            throw "ISCC.exe path is invalid: $isccPath"
          }

          $file = Get-Item $isccPath
          Write-Host "ISCC: $($file.FullName)"
          Write-Host "Inno Setup version: $($file.VersionInfo.FileVersion)"

      - name: Build Windows installer
        run: python tools/build_windows_installer.py

      - name: Sign Windows installer
        if: steps.windows-signing.outputs.enabled == 'true'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          .\tools\sign_windows_artifact.ps1 `
            -FilePath "release\GhostNet-Cyber-VPN-Setup.exe" `
            -CertificatePath $env:WINDOWS_CERTIFICATE_PATH `
            -CertificatePassword $env:WINDOWS_CERTIFICATE_PASSWORD

      - name: Create versioned Windows installer
        shell: powershell
        run: |
          $installerName = python tools/release_info.py `
            --field windows-filename

          $source = "release\GhostNet-Cyber-VPN-Setup.exe"
          $target = Join-Path "release" $installerName

          Copy-Item `
            -Path $source `
            -Destination $target `
            -Force

          "WINDOWS_VERSIONED_INSTALLER=$target" |
            Out-File `
              -FilePath $env:GITHUB_ENV `
              -Encoding utf8 `
              -Append

          Write-Host "Windows release file: $target"

      - name: Report Windows signature status
        shell: powershell
        run: |
          $installer = $env:WINDOWS_VERSIONED_INSTALLER
          $signature = Get-AuthenticodeSignature $installer

          Write-Host "Signature status: $($signature.Status)"
          Write-Host "Signer: $($signature.SignerCertificate.Subject)"

          if (
            "${{ steps.windows-signing.outputs.enabled }}" -eq "true" -and
            $signature.Status -ne "Valid"
          ) {
            throw "The Windows installer was expected to be signed, but the signature is not valid."
          }

      - name: Create Windows update manifest
        shell: powershell
        run: |
          python tools/create_update_manifest.py `
            --output release/version.json `
            --windows-file $env:WINDOWS_VERSIONED_INSTALLER

      - name: Verify Windows installer
        shell: powershell
        run: |
          $installer = $env:WINDOWS_VERSIONED_INSTALLER

          if (-not (Test-Path $installer)) {
            throw "Windows installer was not created."
          }

          $size = (Get-Item $installer).Length
          if ($size -lt 1000000) {
            throw "Windows installer is unexpectedly small: $size bytes"
          }

          Write-Host "Installer: $installer"
          Write-Host "Size: $size bytes"

      - name: Remove Windows signing certificate
        if: ${{ always() && steps.windows-signing.outputs.enabled == 'true' }}
        shell: powershell
        run: |
          if ($env:WINDOWS_CERTIFICATE_PATH -and (Test-Path $env:WINDOWS_CERTIFICATE_PATH)) {
            Remove-Item $env:WINDOWS_CERTIFICATE_PATH -Force
          }

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: GhostNet-Cyber-VPN-Windows-Installer
          path: |
            release/GhostNet-Cyber-VPN-Setup-*.exe
            release/version.json
