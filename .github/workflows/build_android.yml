name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Create Android platform files
        run: flutter create --platforms=android --org ru.ghostnet .

      - name: Fix generated Flutter template test
        run: python tools/fix_generated_test.py

      - name: Fix Android name and remove MainActivity duplicates
        run: python tools/patch_app_name.py

      - name: Restore Android release signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "Required GitHub Secret is missing: $name"
              exit 1
            fi
          done

          mkdir -p android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | \
            base64 --decode > android/app/ghostnet-release.jks

          if [ ! -s android/app/ghostnet-release.jks ]; then
            echo "Decoded Android keystore is empty."
            exit 1
          fi

      - name: Configure Android release signing
        run: python tools/patch_android_signing.py

      - name: Verify Android signing patch
        shell: bash
        run: |
          grep -R "ANDROID_KEYSTORE_PATH" android/app/build.gradle*
          grep -R 'signingConfigs.getByName("release")' \
            android/app/build.gradle* || \
          grep -R "signingConfigs.release" android/app/build.gradle*

      - name: Install Firebase Android config
        shell: bash
        run: |
          echo "Current directory: $(pwd)"
          echo "Searching google-services.json..."
          find . -maxdepth 3 -name "google-services.json" -print || true

          GOOGLE_SERVICES_FILE=""

          if [ -f "google-services.json" ]; then
            GOOGLE_SERVICES_FILE="google-services.json"
          elif [ -f "app/google-services.json" ]; then
            GOOGLE_SERVICES_FILE="app/google-services.json"
          elif [ -f "$GITHUB_WORKSPACE/google-services.json" ]; then
            GOOGLE_SERVICES_FILE="$GITHUB_WORKSPACE/google-services.json"
          elif [ -f "$GITHUB_WORKSPACE/app/google-services.json" ]; then
            GOOGLE_SERVICES_FILE="$GITHUB_WORKSPACE/app/google-services.json"
          fi

          if [ -z "$GOOGLE_SERVICES_FILE" ] && [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "Restoring google-services.json from GitHub secret."
            mkdir -p android/app
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
            GOOGLE_SERVICES_FILE="android/app/google-services.json"
          fi

          if [ -z "$GOOGLE_SERVICES_FILE" ]; then
            echo "google-services.json not found"
            echo "Put it near pubspec.yaml, to app/google-services.json, or create GOOGLE_SERVICES_JSON_BASE64 secret."
            exit 1
          fi

          echo "Using Firebase config: $GOOGLE_SERVICES_FILE"
          mkdir -p android/app
          if [ "$GOOGLE_SERVICES_FILE" != "android/app/google-services.json" ]; then
            cp "$GOOGLE_SERVICES_FILE" android/app/google-services.json
          fi

      - name: Install dependencies
        run: flutter pub get


      - name: Verify automatic update system
        run: python tools/update_system_check.py

      - name: Verify security patch
        run: python tools/security_check.py

      - name: Format Dart source
        run: dart format lib/main.dart

      - name: Analyze project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build signed Android APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/ghostnet-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Verify Android APK signature
        shell: bash
        run: |
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" \
            -type f -name apksigner | sort -V | tail -n 1)

          if [ -z "$APKSIGNER" ]; then
            echo "apksigner was not found."
            exit 1
          fi

          "$APKSIGNER" verify \
            --verbose \
            --print-certs \
            build/app/outputs/flutter-apk/app-release.apk

      - name: Prepare Android release files
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk \
            release/GhostNet-Cyber-VPN.apk
          python tools/create_update_manifest.py \
            --output release/version.json

      - name: Remove Android signing key
        if: always()
        shell: bash
        run: rm -f android/app/ghostnet-release.jks

      - name: Upload Android artifact
        uses: actions/upload-artifact@v6
        with:
          name: GhostNet-Cyber-VPN-Android-Release
          path: |
            release/GhostNet-Cyber-VPN.apk
            release/version.json
